hostname "Nexen - Warmup deathmatch"
// Mode deathmatch par défaut (annulé au lancement d'un match)
game_type 1
game_mode 2
mp_respawn_on_death_ct 1
mp_respawn_on_death_t 1
mp_free_armor 1
mp_ignore_round_win_conditions 1
mp_autokick 0
sv_hibernate_when_empty 0
sv_clockcorrection_msecs 15
// GOTV
tv_enable 1
tv_delay 0
tv_autorecord 0
tv_allow_camera_man 0
tv_allow_static_shots 1
tv_chatgroupsize 0
tv_debug 0
tv_delaymapchange 1
tv_deltacache 2
tv_dispatchmode 1
tv_maxclients 10
tv_maxrate 0
tv_relayvoice 0
tv_timeout 60
tv_transmitall 1
tv_advertise_watchable 1
